version: '3.8'

services:
  # FastAPI Backend API
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: streamward-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      # ============================================================================
      # SECTION 1: CORE API REQUIREMENTS
      # ============================================================================
      - OPENAI_API_KEY=your-openai-api-key-here
      # ============================================================================
      # SECTION 2: OKTA AUTHENTICATION - PRIMARY CONFIGURATION
      # ============================================================================
      - OKTA_DOMAIN=https://your-okta-domain.okta.com

      - OKTA_MAIN_SERVER_ID=streamward-chat-authz-server-id-here
      - OKTA_MAIN_AUDIENCE=api://streamward-chat
      # ============================================================================
      # SECTION 3: OKTA AGENT SERVICE CREDENTIALS
      # ============================================================================
      - OKTA_CHAT_ASSISTANT_CLIENT_ID=your-chat-assistant-service-app-client-id
      - OKTA_CHAT_ASSISTANT_CLIENT_SECRET=your-chat-assistant-service-app-client-secret
      - OKTA_HR_SERVER_ID=your-streamward-hr-authz-server-id
      - OKTA_HR_AUDIENCE=api://hr-agent-audience
      - OKTA_HR_SERVICE_CLIENT_ID=your-hr-service-app-client-id
      - OKTA_HR_SERVICE_CLIENT_SECRET=your-hr-service-app-client-secret
      - OKTA_FINANCE_SERVER_ID=your-streamward-finance-authz-server-id
      - OKTA_FINANCE_AUDIENCE=api://finance-agent-audience
      - OKTA_FINANCE_SERVICE_CLIENT_ID=your-finance-service-app-client-id
      - OKTA_FINANCE_SERVICE_CLIENT_SECRET=your-finance-service-app-client-secret
      - OKTA_LEGAL_SERVER_ID=your-streamward-legal-authz-server-id
      - OKTA_LEGAL_AUDIENCE=api://legal-agent-audience
      - OKTA_LEGAL_SERVICE_CLIENT_ID=your-legal-service-app-client-id
      - OKTA_LEGAL_SERVICE_CLIENT_SECRET=your-legal-service-app-client-secret
      # ============================================================================
      # SECTION 4: MCP CROSS-APP ACCESS (ID-JAG Token Exchange)
      # ============================================================================
      - OKTA_EMPLOYEE_MCP_AUTHORIZATION_SERVER_ID=your-mcp-authorization-server-id
      - OKTA_CHAT_ASSISTANT_AGENT_AUDIENCE=api://mcp-audience
      - OKTA_CHAT_ASSISTANT_AGENT_ID=your-chat-assistant-agent-service-app-id
      - OKTA_CHAT_ASSISTANT_AGENT_PRIVATE_KEY=jwks-string-for-private-key
      # ============================================================================
      # SECTION 5: FINE-GRAINED AUTHORIZATION (Okta FGA)
      # ============================================================================
      - FGA_STORE_ID=your-fga-store-id
      - FGA_CLIENT_ID=your-fga-client-id
      - FGA_CLIENT_SECRET=your-fga-client-secret
      - FGA_API_URL=https://api.us1.fga.dev
      - FGA_API_AUDIENCE=https://api.us1.fga.dev/
      - FGA_API_TOKEN_ISSUER=auth.fga.dev
      - FGA_AUTHORIZATION_MODEL_ID=your-auth-model-id
      # ============================================================================
      # SECTION 6: RAG & VECTOR STORAGE (Pinecone)
      # ============================================================================
      - PINECONE_API_KEY=your-pinecone-api-key
      - PINECONE_ENVIRONMENT=your-pinecone-environment
      - PINECONE_INDEX_NAME=streamward-documents
      # ============================================================================
      # SECTION 7: PRIVACY & COMPLIANCE
      # ============================================================================
      - ALLOW_PII_IN_LLM_PROMPTS=false
      - ANONYMOUS_ID_SALT=streamward-privacy-salt-change-in-production
    restart: unless-stopped
    networks:
      - streamward-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamward-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # ============================================================================
      # SECTION 1: NEXTAUTH CONFIGURATION
      # ============================================================================
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-nextauth-secret-key-change-in-production
      # ============================================================================
      # SECTION 2: OKTA AUTHENTICATION CONFIGURATION
      # ============================================================================
      - OKTA_CLIENT_ID=your-okta-chat-gui-app-client-id
      - OKTA_CLIENT_SECRET=your-okta-chat-gui-app-client-secret
      - OKTA_ISSUER=https://your-okta-domain.okta.com
      - NEXT_PUBLIC_OKTA_BASE_URL=https://your-okta-domain.okta.com
      - NEXT_PUBLIC_OKTA_CLIENT_ID=your-okta-chat-gui-app-client-id
      - NEXT_PUBLIC_OKTA_MAIN_SERVER_ID=streamward-chat-authz-server-id-here
      # ============================================================================
      # SECTION 3: API CONFIGURATION
      # ============================================================================
      - NEXT_PUBLIC_API_BASE_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=ws://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - streamward-network

networks:
  streamward-network:
    driver: bridge
